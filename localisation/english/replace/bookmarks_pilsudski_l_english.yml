l_english:
    GATHERING_STORM_NAME:0 "Pax Polonica"
    GATHERING_STORM_DESC:0 "Three years ago, a Polish-French coalition invaded Germany, and ousted Hitler. Germany was then partitioned between Poland and France. However, things are not as good as they might appear to be. The new Prometheist Commonwealth is held up only by the will of the Marshal Pilsudski, while in the east the Empire of Japan stands poised to attack China in Asia. Almost twenty years have passed since the end of the Great War, and the world has yet again been doused in gasoline. A single spark may be all it takes."
    FRA_GATHERING_STORM_DESC:0 "While France was a member of the victors of the war with Germany, its internal affairs are still a large issue..."
    POL_GATHERING_STORM_DESC:1 "After centuries in which the Polish nation has been divided between three empires, Poland now stands independent once again. The German Reich and the Russian \"Soviet\" Empire has crumbled, but...\n\n...will the Marshal maintain his new Commonwealth?\n\nWill the Germans ever forgive us for ripping them apart?\n\nWill we see a world where Prometheism continues to be victorious?"
 