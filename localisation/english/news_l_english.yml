l_english:
  polish_civil_war_news.01.t: "Natives emerge victorious in Livonian War"
  polish_civil_war_news.01.desc: "Today the Baltic German regime capitulated. The Latvian and Estonian governments now shift their focus to rebuilding their ruined nations."
  polish_civil_war_news.01.a: "Long live the Free Baltic!"
  polish_civil_war_news.01.b: "We will have to stop those separatists!"
  polish_civil_war_news.01.c: "Good for them, I guess..."

  polish_civil_war_news.02.t: "Baltic Germans emerge victorious in Livonian War"
  polish_civil_war_news.02.desc: "Today the baltic regimes of Latvia and Estonia have capitulated. The new Rosenbergite regime now holds control over Latvia and Estonia, aimed at creating a state ruled by Baltic Germans and Poles alone."
  polish_civil_war_news.02.a: "Livonia, Livonia above all!"
  polish_civil_war_news.02.b: "This benefits us..."
  polish_civil_war_news.02.c: "This is a tragedy for Latvians and Estonians."
