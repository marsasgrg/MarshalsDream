l_english:
  polish_civil_war.1.t: "The Golden Year"
  polish_civil_war.1.desc: "After the invasion of Germany with French help in 1933 and the war to save the Batlic states from Soviet interference in 1934, the @POL§!§RPrometheist Commonwealth§! has been formed. The year 1935 has been glorious, with the Marshal continuing to help us build a beautiful country. Let's hope that this year is as great as the last one."
  polish_civil_war.1.a: "Glory to the the @POL§!§RCommonwealth§!!"
  polish_civil_war.2.t: "Pilsudski Ill"
  polish_civil_war.2.desc: "The great Marshal has contracted some sort of illness. His doctors are already working to ensure his health, and he should recover soon."
  polish_civil_war.2.a: "Let's pray for his fast recovery!"
  polish_civil_war.3.t: "Pilsudski Dies"
  polish_civil_war.3.desc: "The great Marshal Józef Piłsudski has died, what happens now?"
  polish_civil_war.3.a: "We must ensure the integrity of the Commonwealth!"
  polish_civil_war.4.t: "The Funeral"
  polish_civil_war.4.desc: "The Marshal has been buried in two parts - his heart has been laid to rest in Wilno (and his brain given to the university there), while his body is in Krakow.\nNow, our goal is to maintain the Commonwealth he built."
  polish_civil_war.4.a: "May He rest in peace"
  custom_tt_they_begin_to_make_their_plays: "The @LIT@LAT@EST@UKR@BLR§Rvultures§! are coming out of their nests... Prepare."
  polish_civil_war.5.t: "Tell Me, Where Does Fortune Lie?"
  polish_civil_war.5.desc: "A man who's name has been forgotten by history enters a tent of a fortune teller.\n\"Oh, wise woman, what nation shall achieve great deeds in these troubling times?\""
  polish_civil_war.5.a: "\"In @POL§RPoland§!, mother of the free!\""
  polish_civil_war.5.b: "\"Among the @UKR@BLR§BRuthenians§!, who are the oldest of us all!\""
  polish_civil_war.5.c: "\"Where knights once rode, in old @LAT@EST§YLivonia§!!\""
  polish_civil_war.5.d: "\"The Marshal's Heart in @LIT§GLithuania§! will bring it glory!\""
  polish_civil_war.6.t: "Fate of Poland"
  polish_civil_war.6.desc: "The death of the Marshal opened a void... who can even fill it?"
  polish_civil_war.6.a: "The §YPolish Crown§! must protect her people!"
  polish_civil_war.6.b: "We were too lenient. §LWe won't make this mistake again§!!"
  polish_civil_war.6.c: "The dogs may bark, but §gthe caravan§! goes on!"
  polish_civil_war.6.d: "The Marshal wanted §Bfreedom §!§Rfor all§!!"
  polish_civil_war.7.t: "Fate of the Eastern Slavs"
  polish_civil_war.7.desc: "Who is favored among the Eastern Slavs?"
  polish_civil_war.7.a: "§RBelarus§!!"
  polish_civil_war.7.b: "§BUkraine§!!"
  polish_civil_war.7.c: "§YThe Cossack-Tatar Realm§!!"
  polish_civil_war.8.t: "Fate of Livonia"
  polish_civil_war.8.desc: "Who shall Livonia go with?"
  polish_civil_war.8.a: "§RLatvia!!"
  polish_civil_war.8.b: "§BEstonia§!!"
  polish_civil_war.8.c: "§gThe Baltic Germans must build a realm of their own§!!"  
  polish_civil_war.9.t: "Fate of Lithuania"
  polish_civil_war.9.desc: "What shall be the thought behind Lithuania?"
  polish_civil_war.9.a: "§BFreedom for Lithuania!!"
  polish_civil_war.9.b: "§yThe memory of Vytautas the Great§!!"
  polish_civil_war.9.c: "\"§RArise, oh wretched of the earth!§!\"!"
  polish_civil_war.10.t: "Germany, Gdansk and Królewiec Break Free!"
  polish_civil_war.10.desc: "The least Polonised territories of the western Commonwealth, Gdansk and Królewiec have declared that they wish to join Germany! And to make matters worse, the government in the puppet Kingdom of Prussia itself declared it's cuttting ties with the Commonwealth and \"pursuing it's own destiny\". How repulsive!"
  polish_civil_war.10.a: "Next time we won't give them a state!"
  polish_civil_war.11.t: "Separatists in the East!"
  polish_civil_war.desc: "The nations of Ukraine and Belarus have declared independence from the Commonwealth. Together with them, a new \"Cossack-Tatar Realm\" has been formed to the Southeast in Ukraine. All of them claim to be ready to resist the Commonwealth in case of war."
  polish_civil_war.11.a: "Accursed traitors!"
  polish_civil_war.11.b: "Goodbye Poland!"
  